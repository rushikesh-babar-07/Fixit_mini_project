{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card bg-dark border-secondary">
            <div class="card-body p-4">

                <h3 class="text-white mb-1">Create Account</h3>
                <p class="text-secondary small mb-4">Join FixIt — Team FixForce, TKIET Warananagar</p>

                <form method="POST" action="{{ url_for('register') }}">

                    <div class="mb-3">
                        <label class="form-label text-secondary">Full Name</label>
                        <input type="text" name="name" class="form-control bg-secondary text-white border-0"
                               placeholder="Your Name" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-secondary">Email</label>
                        <input type="email" name="email" class="form-control bg-secondary text-white border-0"
                               placeholder="your@email.com" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-secondary">Password</label>
                        <input type="password" name="password" class="form-control bg-secondary text-white border-0"
                               placeholder="Min 6 characters" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-secondary">Confirm Password</label>
                        <input type="password" name="confirm_password" class="form-control bg-secondary text-white border-0"
                               placeholder="Repeat password" required>
                    </div>

                    <button type="submit" class="btn btn-danger w-100">Create Account</button>

                </form>

                <p class="text-secondary text-center mt-3 small">
                    Already have an account? <a href="{{ url_for('login') }}" class="text-danger">Login here</a>
                </p>

            </div>
        </div>
    </div>
</div>
{% endblock %}
